
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kishan Modi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Plus Jakarta Sans', sans-serif;
      perspective: 800px;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      font-weight: 800;
      color: #f0ede8;
      letter-spacing: -0.03em;
      line-height: 1.25;
      text-align: left;
    }

    .static-line { display: block; }

    /* ── FLIP STAGE ── */
    .flip-stage {
      display: inline-block;
      position: relative;
      height: 1.25em;
      vertical-align: bottom;
      perspective: 600px;
      /* width set by JS */
    }

    /* The two faces */
    .flip-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      font-weight: 800;
      white-space: nowrap;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .flip-face.front {
      transform: rotateX(0deg);
    }

    .flip-face.back {
      transform: rotateX(90deg);   /* starts tucked behind */
    }

    /* Animating states */
    .flip-stage.flipping .front {
      animation: foldUp 0.42s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .flip-stage.flipping .back {
      animation: unfoldDown 0.42s cubic-bezier(0.4,0,0.2,1) 0.38s forwards;
    }

    @keyframes foldUp {
      0%   { transform: rotateX(0deg);    opacity: 1; }
      100% { transform: rotateX(-90deg);  opacity: 0.2; }
    }

    @keyframes unfoldDown {
      0%   { transform: rotateX(90deg);   opacity: 0.2; }
      100% { transform: rotateX(0deg);    opacity: 1; }
    }

    /* Gradient colours per role index */
    .g0 { background: linear-gradient(90deg,#7c6aff,#e040fb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .g1 { background: linear-gradient(90deg,#ff6b6b,#ffa94d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .g2 { background: linear-gradient(90deg,#00e5ff,#00b4d8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .g3 { background: linear-gradient(90deg,#69ffb4,#00c896); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .g4 { background: linear-gradient(90deg,#ff9de2,#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .g5 { background: linear-gradient(90deg,#ffe66d,#f7971e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  </style>
</head>
<body>

  <h1>
    <span class="static-line">I'm Kishan Modi,</span>
    <span class="flip-stage" id="stage">
      <span class="flip-face front" id="front"></span>
      <span class="flip-face back"  id="back"></span>
    </span>
  </h1>

  <script>
    const roles = [
      "UI/UX Designer",
      "Graphics Designer",
      "Front-End Developer",
      "Brand Strategist",
      "Motion Designer",
      "Creative Director",
    ];

    const stage = document.getElementById('stage');
    const front = document.getElementById('front');
    const back  = document.getElementById('back');

    let current = 0;

    /* measure widths of all roles so the stage never jumps */
    const ruler = document.createElement('span');
    ruler.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font:800 clamp(2.2rem,5vw,4.5rem) "Plus Jakarta Sans",sans-serif;letter-spacing:-0.03em;';
    document.body.appendChild(ruler);
    const widths = roles.map(r => { ruler.textContent = r; return ruler.offsetWidth; });
    document.body.removeChild(ruler);
    const maxW = Math.max(...widths);
    stage.style.width = maxW + 'px';

    function applyGradient(el, idx) {
      el.className = `flip-face ${el.id} g${idx % 6}`;
    }

    /* init front face */
    front.textContent = roles[0];
    applyGradient(front, 0);

    function doFlip() {
      const next = (current + 1) % roles.length;

      /* load the incoming text on the back face */
      back.textContent = roles[next];
      applyGradient(back, next);

      /* trigger 3-D flip */
      stage.classList.add('flipping');

      /* after both halves finish, reset and swap */
      setTimeout(() => {
        stage.classList.remove('flipping');

        /* promote back → front */
        front.textContent = roles[next];
        applyGradient(front, next);

        /* reset positions without transition */
        front.style.animation = 'none';
        back.style.animation  = 'none';
        front.offsetHeight; /* force reflow */
        front.style.animation = '';
        back.style.animation  = '';

        current = next;
      }, 880); /* just after unfoldDown ends */
    }

    /* first flip after 2.2 s, then every 2.4 s */
    setTimeout(() => {
      doFlip();
      setInterval(doFlip, 2400);
    }, 2200);
  </script>

</body>
</html>
