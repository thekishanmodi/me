<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticky Board</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#121212; --surface:#1E1E1E; --surface2:#2A2A2A;
  --border:#333; --text:#E8E8E8; --muted:#777;
  --accent:#FFD966; --accent-fg:#111;
  --danger:#FF6B6B;
  --sh:0 4px 20px rgba(0,0,0,.55);
  --sh2:0 14px 44px rgba(0,0,0,.75);
  --toolbar-h:62px;
}
[data-theme="light"] {
  --bg:#EDE9E3; --surface:#fff; --surface2:#F5F2EE;
  --border:#DDD; --text:#1A1A1A; --muted:#999;
  --sh:0 4px 20px rgba(0,0,0,.10);
  --sh2:0 14px 44px rgba(0,0,0,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* TOOLBAR */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 20px;
  z-index:900;box-shadow:0 2px 18px rgba(0,0,0,.25);
}
.logo{font-family:'Caveat',cursive;font-size:25px;font-weight:700;color:var(--accent);letter-spacing:-.3px;margin-right:6px;white-space:nowrap}
.sep{width:1px;height:28px;background:var(--border);margin:0 2px;flex-shrink:0}
#sw{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0 12px;flex:1;max-width:260px;transition:border-color .2s}
#sw:focus-within{border-color:var(--accent)}
#sw svg{color:var(--muted);flex-shrink:0}
#si{background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;width:100%;padding:8px 0}
#si::placeholder{color:var(--muted)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13.5px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .17s;white-space:nowrap}
.tb-btn:hover{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);transform:translateY(-1px)}
.tb-btn.icon{padding:8px 10px}
.tb-btn.red:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
#note-count{font-size:12px;color:var(--muted);padding:4px 10px;background:var(--surface2);border-radius:20px;border:1px solid var(--border);white-space:nowrap}

/* BOARD */
#board{padding:calc(var(--toolbar-h) + 22px) 18px 48px;columns:5 220px;column-gap:14px}

/* NOTE CARD */
.note{
  break-inside:avoid;display:inline-block;width:100%;
  margin-bottom:14px;border-radius:14px;padding:18px 16px 14px;
  position:relative;box-shadow:var(--sh);
  animation:noteIn .32s cubic-bezier(.34,1.56,.64,1) both;
  word-break:break-word;vertical-align:top;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;
}
.note:hover{box-shadow:var(--sh2);transform:translateY(-3px) scale(1.015)}
.note.pinned{box-shadow:var(--sh2),0 0 0 2.5px var(--danger)!important}
.note.hidden{display:none!important}

@keyframes noteIn{
  from{opacity:0;transform:scale(.82) translateY(18px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* pin flag */
.pin-flag{position:absolute;top:-8px;right:14px;font-size:20px;display:none;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))}
.note.pinned .pin-flag{display:block}

/* hover actions */
.note-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;pointer-events:none;transition:opacity .15s}
.note:hover .note-actions{opacity:1;pointer-events:all}
.na-btn{width:28px;height:28px;border-radius:8px;border:none;background:rgba(0,0,0,.2);color:inherit;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .15s;backdrop-filter:blur(4px)}
.na-btn:hover{background:rgba(0,0,0,.4);transform:scale(1.12)}
.na-btn.del:hover{background:rgba(255,80,80,.5)}
.na-btn.pin.active{background:rgba(255,107,107,.4)}

/* text content */
.note-title{font-family:'Caveat',cursive;font-size:21px;font-weight:700;line-height:1.25;margin-bottom:7px;display:none}
.note-title.show{display:block}
.note-body{font-family:'Caveat',cursive;font-size:17px;line-height:1.6;white-space:pre-wrap}
.note-date{display:block;margin-top:10px;font-size:11px;font-family:'DM Sans',sans-serif;opacity:.4}

/* FORM MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1200;align-items:center;justify-content:center;backdrop-filter:blur(7px)}
#overlay.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#form-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px 26px;width:min(460px,94vw);box-shadow:var(--sh2);animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(32px);opacity:0}to{transform:none;opacity:1}}
.form-h{font-size:19px;font-weight:600;margin-bottom:22px;display:flex;align-items:center;gap:8px}
.form-h span{font-size:22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input[type="text"],.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 14px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.field textarea{resize:vertical;min-height:100px;font-size:14px;line-height:1.6}
.field input[type="text"]:focus,.field textarea:focus{border-color:var(--accent)}
.color-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cp-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.cp-dot:hover{transform:scale(1.2)}
.cp-dot.sel{border-color:rgba(255,255,255,.85);transform:scale(1.15)}
[data-theme="light"] .cp-dot.sel{border-color:rgba(0,0,0,.45)}
.cp-custom{position:relative;width:28px;height:28px;flex-shrink:0}
.cp-custom input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none}
.cp-icon{width:28px;height:28px;border-radius:50%;pointer-events:none;background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red);border:3px solid rgba(255,255,255,.35);transition:transform .15s}
.cp-custom:hover .cp-icon{transform:scale(1.2)}
#preview-strip{border-radius:10px;padding:14px;margin-bottom:16px;font-family:'Caveat',cursive;font-size:17px;line-height:1.5;min-height:56px;transition:background .2s,color .2s;border:1px solid rgba(255,255,255,.06)}
.form-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.f-btn{padding:10px 20px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.f-btn.cancel{background:var(--surface2);color:var(--text)}
.f-btn.cancel:hover{background:var(--border)}
.f-btn.submit{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.f-btn.submit:hover{filter:brightness(1.08);transform:translateY(-1px)}
.f-btn.submit:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}
.char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}

/* CLEAR MODAL */
#clear-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1300;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#clear-overlay.open{display:flex}
#clear-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 30px;width:min(340px,92vw);box-shadow:var(--sh2);animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
#clear-card h3{font-size:17px;margin-bottom:8px}
#clear-card p{font-size:14px;color:var(--muted);margin-bottom:22px}

/* EMPTY */
#empty{position:fixed;inset:var(--toolbar-h) 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;opacity:0;transition:opacity .35s}
#empty.show{opacity:1}
#empty svg{opacity:.18}
#empty p{font-size:14.5px;color:var(--muted);font-style:italic}

/* TOAST */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:30px;padding:10px 22px;font-size:13.5px;box-shadow:var(--sh);transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* RESPONSIVE */
@media(max-width:700px){#board{columns:2 150px;column-gap:10px;padding:calc(var(--toolbar-h)+14px) 10px 36px}#sw{max-width:130px}#note-count{display:none}}
@media(max-width:430px){#board{columns:1}.tb-btn span{display:none}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="logo">📌 Sticky Board</div>
  <div class="sep"></div>
  <button class="tb-btn" id="add-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Add Note</span>
  </button>
  <div class="sep"></div>
  <div id="sw">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="si" placeholder="Search notes…" type="text">
  </div>
  <div class="tb-right">
    <span id="note-count">0 notes</span>
    <button class="tb-btn icon" id="export-btn" title="Export JSON">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="tb-btn icon" id="theme-btn" title="Toggle theme">
      <svg id="ti" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="tb-btn icon red" id="clear-btn" title="Clear all">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
  </div>
</div>

<!-- BOARD -->
<div id="board"></div>

<!-- EMPTY STATE -->
<div id="empty">
  <svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3z"/><polyline points="15 3 15 9 21 9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
  <p>Click "+ Add Note" to create your first sticky note</p>
</div>

<!-- ADD NOTE MODAL -->
<div id="overlay">
  <div id="form-card">
    <div class="form-h"><span>🗒️</span> New Sticky Note</div>

    <div class="field">
      <label>Title <span style="opacity:.5;font-size:11px;text-transform:none;font-weight:400">(optional)</span></label>
      <input type="text" id="f-title" placeholder="Give it a title…" maxlength="60" autocomplete="off">
    </div>

    <div class="field">
      <label>Note *</label>
      <textarea id="f-text" placeholder="Write your note here…" maxlength="600"></textarea>
      <div class="char-count"><span id="char-used">0</span> / 600</div>
    </div>

    <div class="field">
      <label>Color</label>
      <div class="color-row" id="color-row"></div>
    </div>

    <div class="field">
      <label>Preview</label>
      <div id="preview-strip">Your note will look like this…</div>
    </div>

    <div class="form-btns">
      <button class="f-btn cancel" id="f-cancel">Cancel</button>
      <button class="f-btn submit" id="f-submit" disabled>Add Note ✓</button>
    </div>
  </div>
</div>

<!-- CLEAR CONFIRM -->
<div id="clear-overlay">
  <div id="clear-card">
    <h3>🗑️ Clear All Notes?</h3>
    <p>This will permanently delete every note. This action cannot be undone.</p>
    <div class="form-btns">
      <button class="f-btn cancel" id="cc-cancel">Cancel</button>
      <button class="f-btn submit" style="background:#FF6B6B;border-color:#FF6B6B" id="cc-confirm">Delete All</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const PRESETS=['#FFD966','#FF6B6B','#4D96FF','#6BCB77','#B983FF','#FF9F43','#48DBFB','#FFEAA7'];
const ROTS=[-2.5,-1.5,-.5,0,.5,1.5,2.5];
let notes=[];
let selColor=PRESETS[0];

const $=id=>document.getElementById(id);
const rand=a=>a[Math.floor(Math.random()*a.length)];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function fg(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*.299+g*.587+b*.114)<186?'#FFFFFF':'#111111';
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+
    ' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

// STORAGE
function save(){localStorage.setItem('sbv5',JSON.stringify(notes))}
function load(){try{notes=JSON.parse(localStorage.getItem('sbv5'))||[]}catch{notes=[]}}

// RENDER
function renderAll(){
  $('board').innerHTML='';
  notes.forEach(n=>$('board').appendChild(mkCard(n)));
  syncCount();syncEmpty();
}

function mkCard(d){
  const el=document.createElement('div');
  el.className='note'+(d.pinned?' pinned':'');
  el.dataset.id=d.id;
  el.style.cssText=`background:${d.color};color:${fg(d.color)};transform:rotate(${d.rot||0}deg)`;

  el.innerHTML=`
    <div class="pin-flag">📌</div>
    <div class="note-actions">
      <button class="na-btn pin${d.pinned?' active':''}" title="${d.pinned?'Unpin':'Pin note'}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="${d.pinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L12 8M12 2L8 6M12 2L16 6M5 8h14l-2 6H7L5 8zM12 14v8"/></svg>
      </button>
      <button class="na-btn del" title="Delete note">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="note-title${d.title?' show':''}">${esc(d.title)}</div>
    <div class="note-body">${esc(d.text)}</div>
    <span class="note-date">${fmtDate(d.created)}</span>
  `;

  el.querySelector('.pin').addEventListener('click',e=>{e.stopPropagation();togglePin(el,d.id)});
  el.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();deleteNote(el,d.id)});
  return el;
}

// ACTIONS
function togglePin(el,id){
  const n=notes.find(x=>x.id===id);if(!n)return;
  n.pinned=!n.pinned;save();
  el.classList.toggle('pinned',n.pinned);
  const btn=el.querySelector('.pin');
  btn.classList.toggle('active',n.pinned);
  btn.querySelector('svg').setAttribute('fill',n.pinned?'currentColor':'none');
  btn.title=n.pinned?'Unpin':'Pin note';
  showToast(n.pinned?'📌 Note pinned':'Unpinned');
}

function deleteNote(el,id){
  el.style.transition='transform .22s ease,opacity .22s ease';
  el.style.transform='scale(.8) rotate(-6deg)';el.style.opacity='0';
  setTimeout(()=>{notes=notes.filter(n=>n.id!==id);save();el.remove();syncCount();syncEmpty()},220);
}

// COUNT / EMPTY
function syncCount(){
  const c=notes.length;
  $('note-count').textContent=c===1?'1 note':`${c} notes`;
}
function syncEmpty(){
  $('empty').classList.toggle('show',document.querySelectorAll('.note:not(.hidden)').length===0);
}

// SEARCH
$('si').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll('.note').forEach(el=>{
    const t=(el.querySelector('.note-title').textContent+el.querySelector('.note-body').textContent).toLowerCase();
    el.classList.toggle('hidden',!!q&&!t.includes(q));
  });
  syncEmpty();
});

// THEME
let dark=localStorage.getItem('sb-theme')!=='light';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  localStorage.setItem('sb-theme',dark?'dark':'light');
  $('ti').innerHTML=dark
    ?`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`
    :`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
}
applyTheme();
$('theme-btn').addEventListener('click',()=>{dark=!dark;applyTheme();showToast(dark?'🌙 Dark mode':'☀️ Light mode')});

// EXPORT
$('export-btn').addEventListener('click',()=>{
  const b=new Blob([JSON.stringify(notes,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='sticky-notes.json';a.click();showToast('📥 Exported!');
});

// CLEAR
$('clear-btn').addEventListener('click',()=>{if(!notes.length){showToast('No notes to clear');return}$('clear-overlay').classList.add('open')});
$('cc-cancel').addEventListener('click',()=>$('clear-overlay').classList.remove('open'));
$('cc-confirm').addEventListener('click',()=>{notes=[];save();renderAll();$('clear-overlay').classList.remove('open');showToast('🗑️ All notes cleared')});
$('clear-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')});

// FORM — build color swatches
function buildColorRow(){
  const row=$('color-row');row.innerHTML='';
  PRESETS.forEach(hex=>{
    const d=document.createElement('div');
    d.className='cp-dot'+(hex===selColor?' sel':'');
    d.style.background=hex;d.dataset.hex=hex;d.title=hex;
    d.addEventListener('click',()=>setColor(hex));
    row.appendChild(d);
  });
  const wrap=document.createElement('div');wrap.className='cp-custom';wrap.title='Custom color';
  const inp=document.createElement('input');inp.type='color';inp.value=selColor;
  inp.addEventListener('input',e=>setColor(e.target.value));
  const icon=document.createElement('div');icon.className='cp-icon';
  wrap.appendChild(inp);wrap.appendChild(icon);
  row.appendChild(wrap);
}

function setColor(hex){
  selColor=hex;
  document.querySelectorAll('.cp-dot').forEach(d=>d.classList.toggle('sel',d.dataset.hex===hex));
  updatePreview();
}

function updatePreview(){
  const p=$('preview-strip');
  const title=$('f-title').value.trim();
  const text=$('f-text').value.trim();
  p.style.background=selColor;
  p.style.color=fg(selColor);
  if(title||text){
    p.innerHTML=(title?`<strong style="display:block;font-size:20px;line-height:1.25;margin-bottom:5px">${esc(title)}</strong>`:'')+`<span style="white-space:pre-wrap">${esc(text||'…')}</span>`;
  }else{
    p.textContent='Your note will look like this…';
    p.style.background=selColor;p.style.color=fg(selColor);
  }
}

function openForm(){
  $('f-title').value='';$('f-text').value='';$('char-used').textContent='0';
  selColor=rand(PRESETS);
  buildColorRow();updatePreview();
  $('f-submit').disabled=true;
  $('overlay').classList.add('open');
  setTimeout(()=>$('f-title').focus(),120);
}
function closeForm(){$('overlay').classList.remove('open')}

$('add-btn').addEventListener('click',openForm);
$('f-cancel').addEventListener('click',closeForm);
$('overlay').addEventListener('click',e=>{if(e.target===$('overlay'))closeForm()});

$('f-title').addEventListener('input',updatePreview);

$('f-text').addEventListener('input',function(){
  updatePreview();
  $('char-used').textContent=this.value.length;
  $('f-submit').disabled=this.value.trim().length===0;
});

$('f-submit').addEventListener('click',()=>{
  const title=$('f-title').value.trim();
  const text=$('f-text').value.trim();
  if(!text)return;
  const rot=rand(ROTS);
  const n={id:uid(),title,text,color:selColor,rot,pinned:false,created:Date.now()};
  notes.unshift(n);save();
  const el=mkCard(n);
  $('board').prepend(el);
  syncCount();syncEmpty();
  closeForm();
  showToast('✅ Note added!');
});

// keyboard shortcuts inside form
$('f-title').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('f-text').focus()}});
$('f-text').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();$('f-submit').click()}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeForm();$('clear-overlay').classList.remove('open')}});

// TOAST
let tt;
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2100);
}

// INIT
load();renderAll();

if(!notes.length){
  const demos=[
    {title:'Welcome! 🎉',text:'Click "+ Add Note" to create your first sticky note.',color:'#FFD966'},
    {title:'',text:'Notes are saved automatically — even after closing the tab. 💾',color:'#6BCB77'},
    {title:'',text:'Use the search bar above to filter notes instantly. 🔍',color:'#4D96FF'},
    {title:'Hover to reveal ✨',text:'Hover over any note to see pin and delete buttons.',color:'#B983FF'},
    {title:'',text:'Toggle dark / light mode with the ☀️ button in the toolbar.',color:'#FF9F43'},
  ];
  demos.forEach((d,i)=>{
    notes.push({id:uid(),title:d.title,text:d.text,color:d.color,rot:rand(ROTS),pinned:false,created:Date.now()-i*1000});
  });
  save();renderAll();
}
</script>
