    <title>Text Case | #thekishanmodi</title>

    <style>
        @font-face {
            font-family: "Mona Sans";
            src: url("assets/fonts/MonaSans-VariableFont_wdth.ttf") format("truetype");
            font-weight: 200 900;
            font-style: normal;
        }

        @font-face {
            font-family: "Mona Sans";
            src: url("assets/fonts/MonaSans-Italic-VariableFont_wdth.ttf") format("truetype");
            font-weight: 200 900;
            font-style: italic;
        }

        :root {
            --orange: #fd6204;
            --orange-dark: #d94e00;
            --orange-light: #fff1ea;
            --black: #111;
            --gray-100: #f5f4f2;
            --gray-200: #e8e6e2;
            --gray-400: #a09d99;
            --gray-600: #6b6763;
            --white: #fdfcfa;
            --radius: 10px;
            --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Mona Sans', sans-serif;
            background: var(--white);
            color: var(--black);
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0 1.5rem;
            height: 56px;
            background: var(--black);
            border-bottom: 2px solid var(--orange);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 2px;
            text-decoration: none;
        }

        .logo-text {
            font-family: 'Mona Sans', serif;
            font-size: 1.4rem;
            color: var(--white);
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.15rem;
        }

        .logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--orange);
            margin-left: 1px;
            margin-bottom: 3px;
            align-self: flex-end;
        }

        .stats {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.3rem 0.9rem;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 64px;
            cursor: default;
            transition: background var(--transition);
        }

        .stat:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-family: 'Mona Sans', monospace;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--orange);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-400);
            line-height: 1.2;
        }

        .layout {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 56px);
        }

        /* ── RTE TOOLBAR ── */
        .rte-toolbar {
            flex-shrink: 0;
            background: var(--gray-100);
            border-bottom: 1px solid var(--gray-200);
            padding: 0.45rem 1.25rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.25rem;
        }

        .rte-group {
            display: flex;
            align-items: center;
            gap: 0.15rem;
        }

        .rte-sep {
            width: 1px;
            height: 24px;
            background: var(--gray-200);
            margin: 0 0.3rem;
            border-radius: 1px;
            flex-shrink: 0;
        }

        .rte-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: transparent;
            color: var(--gray-600);
            border: 1.5px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Mona Sans', sans-serif;
            flex-shrink: 0;
            position: relative;
        }

        .rte-btn:hover {
            background: var(--white);
            border-color: var(--gray-200);
            color: var(--black);
        }

        .rte-btn.active {
            background: var(--black);
            border-color: var(--black);
            color: var(--white);
        }

        .rte-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .rte-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--black);
            color: var(--white);
            font-size: 0.65rem;
            font-weight: 500;
            padding: 3px 7px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 999;
            font-family: 'Mona Sans', sans-serif;
            letter-spacing: 0.02em;
        }

        .rte-color-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1.5px solid var(--gray-200);
            cursor: pointer;
            position: relative;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .rte-color-btn:hover {
            border-color: var(--black);
        }

        .rte-color-btn input[type="color"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            border: none;
            padding: 0;
        }

        .color-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            pointer-events: none;
            background: #000;
        }

        .rte-select {
            height: 30px;
            padding: 0 0.5rem;
            font-family: 'Mona Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            background: var(--white);
            color: var(--black);
            border: 1.5px solid var(--gray-200);
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            transition: border-color var(--transition);
            flex-shrink: 0;
        }

        .rte-select:hover,
        .rte-select:focus {
            border-color: var(--black);
        }

        .rte-font-select {
            height: 30px;
            padding: 0 0.5rem;
            font-family: 'Mona Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            background: var(--white);
            color: var(--black);
            border: 1.5px solid var(--gray-200);
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            transition: border-color var(--transition);
            min-width: 100px;
            flex-shrink: 0;
        }

        .rte-font-select:hover,
        .rte-font-select:focus {
            border-color: var(--black);
        }

        /* ── EDITOR ── */
        .editor-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .rte-editor {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            font-family: 'Mona Sans', sans-serif;
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 400;
            line-height: 1.7;
            color: var(--black);
            background: var(--white);
            border: none;
            outline: none;
            padding: clamp(1.5rem, 5vw, 4rem) clamp(1.5rem, 8vw, 6rem);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            caret-color: var(--orange);
        }

        .rte-editor:empty::before {
            content: attr(data-placeholder);
            color: var(--gray-200);
            font-style: italic;
            pointer-events: none;
        }

        .rte-editor::-webkit-scrollbar {
            width: 4px;
        }

        .rte-editor::-webkit-scrollbar-track {
            background: transparent;
        }

        .rte-editor::-webkit-scrollbar-thumb {
            background: var(--gray-200);
            border-radius: 4px;
        }

        .rte-editor::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        .rte-editor h1 {
            font-size: 2em;
            font-weight: 700;
            margin: 0.5em 0 0.3em;
            line-height: 1.25;
        }

        .rte-editor h2 {
            font-size: 1.5em;
            font-weight: 700;
            margin: 0.5em 0 0.3em;
            line-height: 1.3;
        }

        .rte-editor h3 {
            font-size: 1.17em;
            font-weight: 700;
            margin: 0.5em 0 0.3em;
        }

        .rte-editor ul {
            padding-left: 1.5em;
            margin: 0.4em 0;
            list-style-type: disc;
        }

        .rte-editor ol {
            padding-left: 1.5em;
            margin: 0.4em 0;
            list-style-type: decimal;
        }

        .rte-editor li {
            margin: 0.15em 0;
        }

        .rte-editor blockquote {
            border-left: 3px solid var(--orange);
            margin: 0.6em 0;
            padding: 0.4em 1em;
            background: var(--orange-light);
            border-radius: 0 6px 6px 0;
            font-style: italic;
            color: var(--gray-600);
        }

        .rte-editor pre {
            font-family: 'Courier New', monospace;
            background: var(--gray-100);
            border-radius: 4px;
            padding: 0.75em 1em;
            margin: 0.4em 0;
            overflow-x: auto;
            font-size: 0.85em;
        }

        .rte-editor code {
            font-family: 'Courier New', monospace;
            background: var(--gray-100);
            border-radius: 4px;
            padding: 0.1em 0.35em;
            font-size: 0.88em;
        }

        .rte-editor a {
            color: var(--orange);
            text-decoration: underline;
        }

        .rte-editor hr {
            border: none;
            border-top: 2px solid var(--gray-200);
            margin: 1em 0;
        }

        .rte-editor table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.5em 0;
            font-size: 0.9em;
        }

        .rte-editor th,
        .rte-editor td {
            border: 1px solid var(--gray-200);
            padding: 0.4em 0.75em;
            text-align: left;
        }

        .rte-editor th {
            background: var(--gray-100);
            font-weight: 600;
        }

        /* ── COPY BTN ── */
        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: var(--black);
            color: var(--white);
            font-family: 'Mona Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .copy-btn:hover {
            background: var(--orange);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(253, 98, 4, 0.35);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: #22a05c;
        }

        .copy-icon {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        /* ── SEARCH & REPLACE ── */
        .sr-panel {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            width: min(520px, calc(100% - 2rem));
            background: var(--white);
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.13), 0 2px 8px rgba(0, 0, 0, 0.07);
            z-index: 100;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease, transform 200ms ease;
        }

        .sr-panel.open {
            opacity: 1;
            pointer-events: all;
            transform: translateX(-50%) translateY(0);
        }

        .sr-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 1rem 0.65rem 1.1rem;
            background: var(--black);
            color: var(--white);
        }

        .sr-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sr-title svg {
            color: var(--orange);
        }

        .sr-match-info {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--gray-400);
            font-variant-numeric: tabular-nums;
            min-width: 80px;
            text-align: center;
        }

        .sr-match-info.has-matches {
            color: var(--orange);
        }

        .sr-close {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.2rem;
            border-radius: 4px;
            line-height: 0;
            transition: color var(--transition);
            display: flex;
        }

        .sr-close:hover {
            color: var(--white);
        }

        .sr-body {
            padding: 0.85rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .sr-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sr-input-wrap {
            position: relative;
            flex: 1;
        }

        .sr-input {
            width: 100%;
            font-family: 'Mona Sans', monospace;
            font-size: 0.88rem;
            font-weight: 400;
            padding: 0.55rem 0.85rem;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            background: var(--gray-100);
            color: var(--black);
            outline: none;
            transition: border-color var(--transition), background var(--transition);
        }

        .sr-input:focus {
            border-color: var(--orange);
            background: var(--white);
        }

        .sr-input::placeholder {
            color: var(--gray-400);
            font-style: normal;
        }

        .sr-input.no-match {
            border-color: #e53e3e;
            background: #fff5f5;
        }

        .sr-nav {
            display: flex;
            gap: 0.25rem;
        }

        .sr-nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--gray-100);
            border: 1.5px solid var(--gray-200);
            border-radius: 6px;
            cursor: pointer;
            color: var(--gray-600);
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .sr-nav-btn:hover:not(:disabled) {
            background: var(--black);
            border-color: var(--black);
            color: var(--white);
        }

        .sr-nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .sr-options {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            padding: 0 0.1rem;
        }

        .sr-option {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--gray-600);
            cursor: pointer;
            user-select: none;
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            border: 1.5px solid transparent;
            transition: all var(--transition);
        }

        .sr-option input {
            accent-color: var(--orange);
            width: 13px;
            height: 13px;
            cursor: pointer;
        }

        .sr-option:hover {
            background: var(--orange-light);
            border-color: #ffdcc9;
            color: var(--orange-dark);
        }

        .sr-option.active {
            background: var(--orange-light);
            border-color: var(--orange);
            color: var(--orange-dark);
        }

        .sr-actions {
            display: flex;
            gap: 0.4rem;
        }

        .sr-btn {
            flex: 1;
            padding: 0.5rem 0.85rem;
            font-family: 'Mona Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 7px;
            border: 1.5px solid;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .sr-btn.replace-one {
            background: var(--white);
            color: var(--black);
            border-color: var(--gray-200);
        }

        .sr-btn.replace-one:hover:not(:disabled) {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .sr-btn.replace-all {
            background: var(--orange);
            color: var(--white);
            border-color: var(--orange);
        }

        .sr-btn.replace-all:hover:not(:disabled) {
            background: var(--orange-dark);
            border-color: var(--orange-dark);
        }

        .sr-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── BOTTOM TOOLBAR ── */
        .toolbar {
            flex-shrink: 0;
            background: var(--gray-100);
            border-top: 1px solid var(--gray-200);
            padding: 0.75rem 1.25rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .toolbar-inner {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem 1rem;
            background: var(--white);
            color: var(--black);
            font-family: 'Mona Sans', monospace;
            font-size: 0.72rem;
            font-weight: 500;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        .btn:hover {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn.primary {
            background: var(--orange);
            color: var(--white);
            border-color: var(--orange);
        }

        .btn.primary:hover {
            background: var(--orange-dark);
            border-color: var(--orange-dark);
        }

        .btn.ghost {
            background: transparent;
            color: var(--gray-600);
            border-color: var(--gray-200);
        }

        .btn.ghost:hover {
            background: #fee8d8;
            color: var(--orange-dark);
            border-color: var(--orange);
        }

        .btn.sr-toggle {
            background: transparent;
            color: var(--gray-600);
            border-color: var(--gray-200);
        }

        .btn.sr-toggle.active {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .btn.sr-toggle:hover {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
        }

        .sep {
            width: 1px;
            height: 32px;
            background: var(--gray-200);
            align-self: center;
            margin: 0 0.15rem;
            border-radius: 1px;
        }

        .badge {
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink3);
            border: 1px solid var(--ink4);
            border-radius: 4px;
            padding: 4px 8px;
            text-decoration: none;
            margin-left: auto;
        }

        .word-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--orange), #ff9f52);
            transition: width 0.3s ease;
            border-radius: 0 2px 2px 0;
            pointer-events: none;
            opacity: 0.6;
        }

        /* ── LINK DIALOG ── */
        .link-dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .link-dialog-overlay.open {
            display: flex;
        }

        .link-dialog {
            background: var(--white);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            width: min(360px, calc(100% - 2rem));
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
        }

        .link-dialog h3 {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 0.85rem;
        }

        .link-dialog input {
            width: 100%;
            font-family: 'Mona Sans', sans-serif;
            font-size: 0.88rem;
            padding: 0.55rem 0.85rem;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            outline: none;
            background: var(--gray-100);
            color: var(--black);
            margin-bottom: 0.75rem;
            transition: border-color var(--transition);
        }

        .link-dialog input:focus {
            border-color: var(--orange);
            background: var(--white);
        }

        .link-dialog-btns {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .link-dialog-btns button {
            padding: 0.45rem 1rem;
            font-family: 'Mona Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 7px;
            border: 1.5px solid var(--gray-200);
            cursor: pointer;
            transition: all var(--transition);
        }

        .link-dialog-btns .btn-cancel {
            background: var(--white);
            color: var(--gray-600);
        }

        .link-dialog-btns .btn-cancel:hover {
            background: var(--gray-100);
        }

        .link-dialog-btns .btn-ok {
            background: var(--orange);
            color: var(--white);
            border-color: var(--orange);
        }

        .link-dialog-btns .btn-ok:hover {
            background: var(--orange-dark);
            border-color: var(--orange-dark);
        }

        @keyframes statPop {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.25);
            }

            100% {
                transform: scale(1);
            }
        }

        .stat-value.pop {
            animation: statPop 280ms ease;
        }

        @media (max-width: 480px) {
            .stat:nth-child(n+3) .stat-label {
                display: none;
            }

            .stat {
                min-width: 48px;
                padding: 0.3rem 0.6rem;
            }

            .sep {
                display: none;
            }

            .rte-toolbar {
                gap: 0.15rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="#" class="logo">
            <span class="logo-text"><img src="assets/images/favicon.png" alt=""> Text Case</span>
            <span class="logo-dot"></span>
        </a>
        <div class="stats">
            <div class="stat" title="Characters"><span class="stat-value" id="charCount">0</span><span
                    class="stat-label">Chars</span></div>
            <div class="stat" title="Words"><span class="stat-value" id="wordCount">0</span><span
                    class="stat-label">Words</span></div>
            <div class="stat" title="Sentences"><span class="stat-value" id="sentenceCount">0</span><span
                    class="stat-label">Sentences</span></div>
            <div class="stat" title="Lines"><span class="stat-value" id="lineCount">1</span><span
                    class="stat-label">Lines</span></div>
            <div class="stat" title="Reading time"><span class="stat-value" id="readTime">0m</span><span
                    class="stat-label">Read</span></div>
        </div>
    </header>

    <div class="layout">

        <!-- Rich Text Toolbar -->
        <div class="rte-toolbar">
            <div class="rte-group">
                <select class="rte-select" id="blockFormat" onchange="applyBlockFormat(this.value)"
                    title="Block format">
                    <option value="p">Paragraph</option>
                    <option value="h1">Heading 1</option>
                    <option value="h2">Heading 2</option>
                    <option value="h3">Heading 3</option>
                    <option value="pre">Code Block</option>
                    <option value="blockquote">Quote</option>
                </select>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <select class="rte-font-select" id="fontFamily" onchange="applyFont(this.value)" title="Font family">
                    <option value="">Default</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                </select>
            </div>

            <div class="rte-group">
                <select class="rte-select" id="fontSize" onchange="applyFontSize(this.value)" title="Font size"
                    style="min-width:62px">
                    <option value="">Size</option>
                    <option value="1">8pt</option>
                    <option value="2">10pt</option>
                    <option value="3">12pt</option>
                    <option value="4">14pt</option>
                    <option value="5">18pt</option>
                    <option value="6">24pt</option>
                    <option value="7">36pt</option>
                </select>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <button class="rte-btn" id="btnBold" onclick="fmt('bold')" title="Bold (Ctrl+B)"><b>B</b></button>
                <button class="rte-btn" id="btnItalic" onclick="fmt('italic')" title="Italic (Ctrl+I)"><i>I</i></button>
                <button class="rte-btn" id="btnUnderline" onclick="fmt('underline')" title="Underline (Ctrl+U)"
                    style="text-decoration:underline">U</button>
                <button class="rte-btn" id="btnStrike" onclick="fmt('strikeThrough')" title="Strikethrough"
                    style="text-decoration:line-through">S</button>
                <button class="rte-btn" id="btnSup" onclick="fmt('superscript')" title="Superscript">X<sup
                        style="font-size:8px">2</sup></button>
                <button class="rte-btn" id="btnSub" onclick="fmt('subscript')" title="Subscript">X<sub
                        style="font-size:8px">2</sub></button>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <div class="rte-color-btn" title="Text color">
                    <span class="color-swatch" id="textColorSwatch"></span>
                    <input type="color" id="textColorPicker" value="#111111" oninput="applyTextColor(this.value)" />
                </div>
                <div class="rte-color-btn" title="Highlight color" style="margin-left:2px;">
                    <span class="color-swatch" id="bgColorSwatch" style="background:#ffff00;"></span>
                    <input type="color" id="bgColorPicker" value="#ffff00" oninput="applyBgColor(this.value)" />
                </div>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <button class="rte-btn" id="btnAlignL" onclick="fmt('justifyLeft')" title="Align left"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 4h12M2 7h8M2 10h12M2 13h6" />
                    </svg></button>
                <button class="rte-btn" id="btnAlignC" onclick="fmt('justifyCenter')" title="Align center"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 4h12M4 7h8M2 10h12M5 13h6" />
                    </svg></button>
                <button class="rte-btn" id="btnAlignR" onclick="fmt('justifyRight')" title="Align right"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 4h12M6 7h8M2 10h12M8 13h6" />
                    </svg></button>
                <button class="rte-btn" id="btnAlignJ" onclick="fmt('justifyFull')" title="Justify"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 4h12M2 7h12M2 10h12M2 13h12" />
                    </svg></button>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <button class="rte-btn" onclick="fmt('insertUnorderedList')" title="Bullet list"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="3" cy="5" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="3" cy="9" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="3" cy="13" r="1.2" fill="currentColor" stroke="none" />
                        <path d="M6 5h8M6 9h8M6 13h8" />
                    </svg></button>
                <button class="rte-btn" onclick="fmt('insertOrderedList')" title="Numbered list"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 3h2M3 3v4M2 7h2M6 5h8M6 9h8M6 13h8" />
                        <path d="M2 10h2l-2 3h2" stroke-linejoin="round" />
                    </svg></button>
                <button class="rte-btn" onclick="fmt('outdent')" title="Decrease indent"><svg viewBox="0 0 16 16"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 4h8M6 8h8M6 12h8M2 6l3 2-3 2" />
                    </svg></button>
                <button class="rte-btn" onclick="fmt('indent')" title="Increase indent"><svg viewBox="0 0 16 16"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 4h8M6 8h8M6 12h8M2 6l3 2-3 2" transform="scale(-1,1) translate(-16,0)" />
                    </svg></button>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <button class="rte-btn" onclick="insertLink()" title="Insert link"><svg viewBox="0 0 16 16" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 10a3.5 3.5 0 0 0 5 0l2-2a3.5 3.5 0 0 0-5-5l-1 1" />
                        <path d="M10 6a3.5 3.5 0 0 0-5 0L3 8a3.5 3.5 0 0 0 5 5l1-1" />
                    </svg></button>
                <button class="rte-btn" onclick="insertHR()" title="Insert horizontal rule"><svg viewBox="0 0 16 16"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 8h12" />
                        <path d="M5 5l3-3 3 3M5 11l3 3 3-3" />
                    </svg></button>
                <button class="rte-btn" onclick="insertTable()" title="Insert table"><svg viewBox="0 0 16 16"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="1" y="1" width="14" height="14" rx="2" />
                        <path d="M1 6h14M8 1v14M1 11h14" />
                    </svg></button>
            </div>

            <div class="rte-sep"></div>

            <div class="rte-group">
                <button class="rte-btn" onclick="document.execCommand('undo')" title="Undo (Ctrl+Z)"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M2 6h7a4 4 0 0 1 0 8H5" />
                        <path d="M2 6l3-3-3 3 3 3" />
                    </svg></button>
                <button class="rte-btn" onclick="document.execCommand('redo')" title="Redo (Ctrl+Y)"><svg
                        viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M14 6H7a4 4 0 0 0 0 8h4" />
                        <path d="M14 6l-3-3 3 3-3 3" />
                    </svg></button>
                <button class="rte-btn" onclick="fmt('removeFormat')" title="Clear formatting"><svg viewBox="0 0 16 16"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M3 2h10M6 2l-3 12M10 2l3 12M5 8h6" />
                        <path d="M11 14l3-3M14 14l-3-3" stroke="#e53e3e" />
                    </svg></button>
            </div>
        </div>

        <div class="editor-wrap">
            <div contenteditable="true" id="rteEditor" class="rte-editor"
                data-placeholder="Start typing here… use the toolbar above to format." spellcheck="true"></div>
            <div class="word-bar" id="wordBar"></div>

            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">
                <svg class="copy-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="5" width="9" height="10" rx="2" />
                    <path d="M11 5V3a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" />
                </svg>
                Copy
            </button>

            <div class="sr-panel" id="srPanel">
                <div class="sr-header">
                    <div class="sr-title">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="6.5" cy="6.5" r="4.5" />
                            <path d="M14 14l-3-3" />
                        </svg>
                        Search &amp; Replace
                    </div>
                    <div class="sr-match-info" id="srMatchInfo">No matches</div>
                    <button class="sr-close" onclick="closeSR()" title="Close (Esc)">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round">
                            <path d="M3 3l10 10M13 3L3 13" />
                        </svg>
                    </button>
                </div>
                <div class="sr-body">
                    <div class="sr-row">
                        <div class="sr-input-wrap">
                            <input class="sr-input" id="srSearch" type="text" placeholder="Find…" autocomplete="off"
                                spellcheck="false" oninput="onSearchInput()" />
                        </div>
                        <div class="sr-nav">
                            <button class="sr-nav-btn" id="srPrev" onclick="srNavigate(-1)"
                                title="Previous (Shift+Enter)"><svg width="11" height="11" viewBox="0 0 16 16"
                                    fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M8 12V4M4 8l4-4 4 4" />
                                </svg></button>
                            <button class="sr-nav-btn" id="srNext" onclick="srNavigate(1)" title="Next (Enter)"><svg
                                    width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M8 4v8M4 8l4 4 4-4" />
                                </svg></button>
                        </div>
                    </div>
                    <div class="sr-options">
                        <label class="sr-option"><input type="checkbox" id="optCase"
                                onchange="onSearchInput(); this.closest('.sr-option').classList.toggle('active',this.checked)" />
                            Match case</label>
                        <label class="sr-option"><input type="checkbox" id="optWhole"
                                onchange="onSearchInput(); this.closest('.sr-option').classList.toggle('active',this.checked)" />
                            Whole word</label>
                        <label class="sr-option"><input type="checkbox" id="optRegex"
                                onchange="onSearchInput(); this.closest('.sr-option').classList.toggle('active',this.checked)" />
                            Regex</label>
                    </div>
                    <div class="sr-row">
                        <div class="sr-input-wrap">
                            <input class="sr-input" id="srReplace" type="text" placeholder="Replace with…"
                                autocomplete="off" spellcheck="false" />
                        </div>
                    </div>
                    <div class="sr-actions">
                        <button class="sr-btn replace-one" id="srReplaceOne" onclick="replaceAll()"
                            disabled>Replace</button>
                        <button class="sr-btn replace-all" id="srReplaceAll" onclick="replaceAll()" disabled>Replace
                            All</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="toolbar-inner">
                <button class="btn" onclick="toUpper()" title="UPPERCASE">ABC</button>
                <button class="btn" onclick="toLower()" title="lowercase">abc</button>
                <button class="btn" onclick="toCapitalized()" title="Capitalize Every Word">Abc</button>
                <button class="btn" onclick="toTitle()" title="Title Case">Title</button>
                <button class="btn" onclick="toSentence()" title="Sentence case">Sent.</button>
                <button class="btn" onclick="toAlternating()" title="aLtErNaTiNg">aLt</button>
                <button class="btn" onclick="toInverse()" title="Inverse case">iNV</button>

                <div class="sep"></div>

                <button class="btn" onclick="trimWhitespace()" title="Trim extra spaces">Trim</button>
                <button class="btn" onclick="removeDuplicateLines()" title="Remove duplicate lines">Dedup</button>
                <button class="btn" onclick="sortLines()" title="Sort lines A→Z">Sort↑</button>
                <button class="btn" onclick="reverseLines()" title="Reverse line order">Rev↕</button>

                <div class="sep"></div>

                <button class="btn sr-toggle" id="srToggleBtn" onclick="toggleSR()" title="Search & Replace (Ctrl+H)">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="6.5" cy="6.5" r="4.5" />
                        <path d="M14 14l-3-3" />
                    </svg>
                    Find &amp; Replace (Ctrl+H)
                </button>

                <div class="sep"></div>

                <button class="btn primary" onclick="addLoremParagraph()">+ Lorem</button>
                <button class="btn ghost" onclick="clearText()">Clear</button>
            </div>
            <a href="index.html" class="badge" target="_blank">#thekishanmodi</a>
        </div>
    </div>

    <div class="link-dialog-overlay" id="linkDialogOverlay">
        <div class="link-dialog">
            <h3>Insert Link</h3>
            <input type="text" id="linkText" placeholder="Link text (optional)" />
            <input type="url" id="linkUrl" placeholder="https://…" />
            <div class="link-dialog-btns">
                <button class="btn-cancel" onclick="closeLinkDialog()">Cancel</button>
                <button class="btn-ok" onclick="confirmLink()">Insert</button>
            </div>
        </div>
    </div>

    <script>
        const rteEditor = document.getElementById('rteEditor');
        const charCountEl = document.getElementById('charCount');
        const wordCountEl = document.getElementById('wordCount');
        const sentenceCountEl = document.getElementById('sentenceCount');
        const lineCountEl = document.getElementById('lineCount');
        const readTimeEl = document.getElementById('readTime');
        const wordBar = document.getElementById('wordBar');
        const copyBtn = document.getElementById('copyBtn');

        const RTE_KEY = 'textcase_rte';
        const EXPIRY_KEY = 'textcase_expiry';

        function saveToStorage() {
            localStorage.setItem(RTE_KEY, rteEditor.innerHTML);
            localStorage.setItem(EXPIRY_KEY, Date.now() + 24 * 60 * 60 * 1000);
        }

        function loadFromStorage() {
            const expiry = localStorage.getItem(EXPIRY_KEY);
            if (expiry && Date.now() < parseInt(expiry)) {
                const saved = localStorage.getItem(RTE_KEY);
                if (saved) rteEditor.innerHTML = saved;
            }
            updateStats();
        }

        let prevChars = 0;

        function animatePop(el) {
            el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
        }

        function updateStats() {
            const text = rteEditor.innerText;
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const sentences = text.trim() === '' ? 0 : (text.match(/[.!?]/g) || []).length || 1;
            const lines = text === '' ? 1 : text.split('\n').length;
            const readMins = Math.ceil(words / 200);

            if (chars !== prevChars) animatePop(charCountEl);
            prevChars = chars;

            charCountEl.textContent = chars.toLocaleString();
            wordCountEl.textContent = words.toLocaleString();
            sentenceCountEl.textContent = sentences;
            lineCountEl.textContent = lines;
            readTimeEl.textContent = readMins < 1 ? '<1m' : readMins + 'm';
            wordBar.style.width = (Math.min(words / 500, 1) * 100) + '%';
        }

        function fmt(cmd) {
            rteEditor.focus();
            document.execCommand(cmd, false, null);
            updateFormatState();
        }

        function applyBlockFormat(tag) {
            rteEditor.focus();
            document.execCommand('formatBlock', false, tag);
            updateStats();
        }

        function applyFont(font) {
            rteEditor.focus();
            if (font) document.execCommand('fontName', false, font);
        }

        function applyFontSize(size) {
            rteEditor.focus();
            if (size) document.execCommand('fontSize', false, size);
        }

        function applyTextColor(color) {
            document.getElementById('textColorSwatch').style.background = color;
            rteEditor.focus();
            document.execCommand('foreColor', false, color);
        }

        function applyBgColor(color) {
            document.getElementById('bgColorSwatch').style.background = color;
            rteEditor.focus();
            document.execCommand('hiliteColor', false, color);
        }

        function insertHR() { rteEditor.focus(); document.execCommand('insertHorizontalRule'); }

        function insertTable() {
            rteEditor.focus();
            document.execCommand('insertHTML', false, `<table><thead><tr><th>Header 1</th><th>Header 2</th><th>Header 3</th></tr></thead><tbody><tr><td>Cell</td><td>Cell</td><td>Cell</td></tr><tr><td>Cell</td><td>Cell</td><td>Cell</td></tr></tbody></table><p><br></p>`);
            updateStats();
        }

        function updateFormatState() {
            [['btnBold', 'bold'], ['btnItalic', 'italic'], ['btnUnderline', 'underline'],
            ['btnStrike', 'strikeThrough'], ['btnSup', 'superscript'], ['btnSub', 'subscript'],
            ['btnAlignL', 'justifyLeft'], ['btnAlignC', 'justifyCenter'],
            ['btnAlignR', 'justifyRight'], ['btnAlignJ', 'justifyFull']
            ].forEach(([id, cmd]) => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('active', document.queryCommandState(cmd));
            });
            const tag = document.queryCommandValue('formatBlock').toLowerCase();
            const sel = document.getElementById('blockFormat');
            if (['p', 'h1', 'h2', 'h3', 'pre', 'blockquote'].includes(tag)) sel.value = tag;
            else sel.value = 'p';
        }

        rteEditor.addEventListener('keyup', updateFormatState);
        rteEditor.addEventListener('mouseup', updateFormatState);

        let savedRange = null;

        function insertLink() {
            rteEditor.focus();
            const sel = window.getSelection();
            if (sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();
            document.getElementById('linkText').value = sel.toString();
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkDialogOverlay').classList.add('open');
            setTimeout(() => document.getElementById('linkUrl').focus(), 50);
        }

        function closeLinkDialog() { document.getElementById('linkDialogOverlay').classList.remove('open'); }

        function confirmLink() {
            const url = document.getElementById('linkUrl').value.trim();
            const text = document.getElementById('linkText').value.trim();
            if (!url) { closeLinkDialog(); return; }
            rteEditor.focus();
            if (savedRange) { const s = window.getSelection(); s.removeAllRanges(); s.addRange(savedRange); }
            if (text && !window.getSelection().toString()) {
                document.execCommand('insertHTML', false, `<a href="${url}" target="_blank">${text}</a>`);
            } else {
                document.execCommand('createLink', false, url);
                rteEditor.querySelectorAll('a:not([target])').forEach(a => a.setAttribute('target', '_blank'));
            }
            closeLinkDialog(); updateStats();
        }

        const TITLE_SMALL = new Set(['a', 'an', 'the', 'and', 'but', 'or', 'for', 'nor', 'on', 'at', 'to', 'by', 'in', 'of', 'up', 'as', 'is', 'it']);

        function applyCase(fn) {
            rteEditor.innerText = fn(rteEditor.innerText);
            updateStats(); saveToStorage(); rteEditor.focus();
        }

        function toUpper() { applyCase(t => t.toUpperCase()); }
        function toLower() { applyCase(t => t.toLowerCase()); }
        function toCapitalized() { applyCase(t => t.toLowerCase().replace(/(^|\s)\S/g, l => l.toUpperCase())); }
        function toTitle() {
            applyCase(t => t.toLowerCase().replace(/\S+/g, (w, i) =>
                i === 0 || !TITLE_SMALL.has(w) ? w.charAt(0).toUpperCase() + w.slice(1) : w));
        }
        function toSentence() { applyCase(t => t.toLowerCase().replace(/(^\s*\S|[.!?]\s+\S)/g, l => l.toUpperCase())); }
        function toAlternating() { applyCase(t => t.split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join('')); }
        function toInverse() { applyCase(t => t.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join('')); }
        function trimWhitespace() { applyCase(t => t.split('\n').map(l => l.trim()).filter((l, i, a) => l || a[i - 1] !== '').join('\n').trim()); }
        function removeDuplicateLines() { applyCase(t => [...new Set(t.split('\n'))].join('\n')); }
        function sortLines() { applyCase(t => t.split('\n').sort((a, b) => a.localeCompare(b)).join('\n')); }
        function reverseLines() { applyCase(t => t.split('\n').reverse().join('\n')); }
        function clearText() { rteEditor.innerHTML = ''; updateStats(); saveToStorage(); }

        const FALLBACK_LOREM = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.';

        async function addLoremParagraph() {
            try {
                const res = await fetch('https://baconipsum.com/api/?type=meat-and-filler&paras=1&format=text&start-with-lorem=1');
                if (!res.ok) throw new Error();
                appendText((await res.text()).trim());
            } catch { appendText(FALLBACK_LOREM); }
        }

        function appendText(para) {
            const p = document.createElement('p');
            p.textContent = para;
            rteEditor.appendChild(p);
            rteEditor.scrollTop = rteEditor.scrollHeight;
            updateStats(); saveToStorage(); rteEditor.focus();
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.write([new ClipboardItem({
                    'text/html': new Blob([rteEditor.innerHTML], { type: 'text/html' }),
                    'text/plain': new Blob([rteEditor.innerText], { type: 'text/plain' })
                })]);
            } catch {
                try { await navigator.clipboard.writeText(rteEditor.innerText); } catch { }
            }
            copyBtn.textContent = '✓ Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
                copyBtn.innerHTML = `<svg class="copy-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="10" rx="2"/><path d="M11 5V3a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg> Copy`;
                copyBtn.classList.remove('copied');
            }, 2000);
        }

        let srOpen = false, srMatches = [], srCurrent = -1;

        const srPanel = document.getElementById('srPanel');
        const srToggleBtn = document.getElementById('srToggleBtn');
        const srSearch = document.getElementById('srSearch');
        const srReplace = document.getElementById('srReplace');
        const srMatchInfo = document.getElementById('srMatchInfo');
        const srPrev = document.getElementById('srPrev');
        const srNext = document.getElementById('srNext');
        const srReplaceOne = document.getElementById('srReplaceOne');
        const srReplaceAll = document.getElementById('srReplaceAll');

        function toggleSR() { srOpen ? closeSR() : openSR(); }

        function openSR() {
            srOpen = true;
            srPanel.classList.add('open');
            srToggleBtn.classList.add('active');
            srSearch.focus(); srSearch.select();
            onSearchInput();
        }

        function closeSR() {
            srOpen = false;
            srPanel.classList.remove('open');
            srToggleBtn.classList.remove('active');
            srMatches = []; srCurrent = -1;
            rteEditor.focus();
        }

        function buildRegex(q) {
            if (!q) return null;
            try {
                let p = document.getElementById('optRegex').checked ? q : q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                if (document.getElementById('optWhole').checked) p = `\\b${p}\\b`;
                return new RegExp(p, document.getElementById('optCase').checked ? 'g' : 'gi');
            } catch { return null; }
        }

        function onSearchInput() {
            const q = srSearch.value;
            srSearch.classList.remove('no-match');
            if (!q) { srMatches = []; srCurrent = -1; srMatchInfo.textContent = 'No matches'; srMatchInfo.classList.remove('has-matches'); setAct(false); return; }
            const rx = buildRegex(q);
            if (!rx) { srMatchInfo.textContent = 'Invalid regex'; srMatchInfo.classList.remove('has-matches'); setAct(false); return; }
            const text = rteEditor.innerText;
            srMatches = [];
            let m;
            while ((m = rx.exec(text)) !== null) { srMatches.push({ start: m.index, end: m.index + m[0].length }); if (m[0].length === 0) rx.lastIndex++; }
            if (!srMatches.length) { srSearch.classList.add('no-match'); srCurrent = -1; srMatchInfo.textContent = 'No matches'; srMatchInfo.classList.remove('has-matches'); setAct(false); }
            else { if (srCurrent < 0 || srCurrent >= srMatches.length) srCurrent = 0; updInfo(); setAct(true); }
        }

        function updInfo() {
            srMatchInfo.textContent = srMatches.length ? `${srCurrent + 1} / ${srMatches.length}` : 'No matches';
            srMatchInfo.classList.toggle('has-matches', !!srMatches.length);
        }

        function setAct(e) { srPrev.disabled = srNext.disabled = srReplaceOne.disabled = srReplaceAll.disabled = !e; }

        function srNavigate(d) {
            if (!srMatches.length) return;
            srCurrent = (srCurrent + d + srMatches.length) % srMatches.length;
            updInfo();
        }

        function replaceAll() {
            if (!srMatches.length) return;
            const rx = buildRegex(srSearch.value);
            if (!rx) return;
            rteEditor.innerHTML = rteEditor.innerHTML.replace(rx, srReplace.value);
            updateStats(); saveToStorage();
            srMatches = []; srCurrent = -1;
            srMatchInfo.textContent = 'Replaced';
            srMatchInfo.classList.remove('has-matches');
            setAct(false);
            srSearch.classList.remove('no-match');
        }

        rteEditor.addEventListener('input', () => { saveToStorage(); updateStats(); if (srOpen) onSearchInput(); });

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'h') { e.preventDefault(); toggleSR(); return; }
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); openSR(); return; }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'c') { e.preventDefault(); copyToClipboard(); return; }
            if (srOpen) {
                if (e.key === 'Escape') { closeSR(); return; }
                if (e.target === srSearch) {
                    if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); srNavigate(-1); return; }
                    if (e.key === 'Enter') { e.preventDefault(); srNavigate(1); return; }
                }
                if (e.target === srReplace && e.key === 'Enter') { e.preventDefault(); replaceAll(); return; }
            }
            if (e.key === 'Escape' && document.getElementById('linkDialogOverlay').classList.contains('open')) closeLinkDialog();
        });

        window.addEventListener('load', () => { loadFromStorage(); rteEditor.focus(); });
    </script>
</body>
